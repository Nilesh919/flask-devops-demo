replicaCount: 2

image:
  repository: nilesh/flask-devops-demo
  tag: "1.0.0"
  pullPolicy: IfNotPresent

service:
  type: NodePort 
  port: 80
  targetPort: 5000

ingress:
  enabled: true
  className: nginx
  host: flask.local

resources:
  requests:
    cpu: "100m"
    memory: "128Mi"
  limits:
    cpu: "500m"
    memory: "256Mi"
